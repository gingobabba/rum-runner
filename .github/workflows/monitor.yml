name: Rum Monitor

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:

concurrency:
  group: rum-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  monitor-public:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor (public retailers)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py --skip klwines

      - name: Commit updated state.json
        if: always()
        run: |
          git config user.name  "rum-monitor[bot]"
          git config user.email "rum-monitor[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: update state.json [skip ci]"
          git push

  monitor-klwines:
    runs-on: self-hosted
    needs: monitor-public
    if: ${{ !cancelled() }}
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pip3 install -r requirements.txt

      - name: Run monitor (KL Wines)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 monitor.py --retailer klwines

      - name: Commit updated state.json
        if: always()
        run: |
          git config user.name  "rum-monitor[bot]"
          git config user.email "rum-monitor[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: update state.json [skip ci]"
          git push || (git fetch origin main && python3 scripts/merge_kl_state.py && git add state.json && git commit --amend --no-edit && git push)
